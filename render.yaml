services:
  - type: web
    name: habitflow
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: habitflow-db
          property: connectionString

databases:
  - name: habitflow-db
    databaseName: habitflow
    user: habitflow
    plan: free
